<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>倉頡六代樹圖</title>
    <meta
      name="description"
      content="用完整倉頡六代字表搭配樹狀分支與結果列表，搜尋單字、字根與字碼。"
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --panel: #ffffff;
        --panel-strong: #ffffff;
        --text: #191613;
        --muted: #6f6761;
        --accent: #6d4b3e;
        --line: rgba(25, 22, 19, 0.1);
        --line-strong: rgba(25, 22, 19, 0.18);
        --radius-md: 1.05rem;
        --shadow-soft: 0 10px 24px rgba(25, 22, 19, 0.04);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #app {
        margin: 0;
        min-height: 100%;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        font-size: 16px;
        line-height: 1.6;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }

      a {
        color: inherit;
      }

      .app-shell {
        min-height: 100vh;
      }

      .landing-page {
        width: 100%;
        margin: 0 auto;
        padding: 2.4rem 2rem 4rem;
      }

      .landing-header,
      .tool-search-block,
      .home-section {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .landing-header {
        padding-bottom: 2rem;
        margin-bottom: 2rem;
        border-bottom: 1px solid var(--line);
      }

      .landing-header-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 1rem;
        justify-content: space-between;
        padding-bottom: 0.2rem;
      }

      .landing-brand {
        font-family: "Iowan Old Style", "Palatino Linotype", serif;
        font-size: 1.15rem;
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      .landing-nav {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 1rem;
        justify-content: flex-end;
      }

      .locale-switch {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        margin-left: 0.5rem;
      }

      .locale-button {
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel);
        color: var(--muted);
        padding: 0.18rem 0.5rem;
        cursor: pointer;
        transition: color 120ms ease, border-color 120ms ease;
      }

      .locale-button:hover,
      .locale-button.is-active {
        color: var(--text);
        border-color: var(--line-strong);
      }

      .landing-nav a,
      .site-link {
        color: var(--muted);
      }

      .landing-nav a:hover,
      .site-link:hover {
        color: var(--accent);
      }

      .eyebrow {
        margin: 0;
        font-size: 0.76rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .landing-title {
        margin: 0;
        font-family: "Iowan Old Style", "Palatino Linotype", serif;
        font-size: clamp(2.1rem, 5vw, 4.2rem);
        line-height: 1.04;
        letter-spacing: -0.03em;
      }

      .atlas-footer p,
      .landing-lead,
      .landing-meta {
        margin: 0;
        color: var(--muted);
      }

      .landing-lead {
        font-size: 1.05rem;
        line-height: 1.8;
      }

      .landing-meta {
        font-size: 0.92rem;
      }

      .tool-search-block {
        width: min(100%, 32rem);
        padding-top: 0.4rem;
      }

      .home-section {
        padding-top: 0.2rem;
      }

      .tool-chart-section {
        gap: 0;
      }

      .atlas-loading {
        display: grid;
        gap: 1rem;
        padding-top: 0.35rem;
      }

      .cangjie-search {
        display: grid;
        gap: 0.75rem;
      }

      .cangjie-search-label {
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .atlas-card,
      .atlas-loading {
        padding: 0;
        border: 0;
        background: transparent;
        box-shadow: none;
      }

      .cangjie-search-input {
        width: 100%;
        min-height: 56px;
        padding: 0 14px;
        border: 1px solid var(--line-strong);
        border-radius: var(--radius-md);
        background: var(--panel);
        font: inherit;
        font-size: 1.02rem;
        color: var(--text);
      }

      .cangjie-search-input:focus {
        outline: 2px solid rgba(109, 75, 62, 0.12);
        border-color: var(--line-strong);
      }

      .site-link {
        text-decoration: none;
        transition: color 120ms ease;
      }

      .atlas-main-grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: 1fr;
      }

      .atlas-tree-card {
        padding-top: 0;
      }

      .cangjie-tree-canvas {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        background: var(--panel);
        box-shadow: var(--shadow-soft);
      }

      .cangjie-candidate-strip {
        margin-bottom: 0.75rem;
        padding-bottom: 0.7rem;
        border-bottom: 1px solid var(--line);
      }

      .cangjie-candidate-row {
        display: grid;
        gap: 0.45rem;
        grid-template-columns: repeat(auto-fit, minmax(6.5rem, 1fr));
      }

      .cangjie-candidate {
        display: inline-flex;
        align-items: baseline;
        justify-content: center;
        gap: 0.4rem;
        width: 100%;
        min-height: 2.2rem;
        padding: 0 0.7rem;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel);
        color: var(--muted);
        font: inherit;
        cursor: pointer;
        transition: border-color 120ms ease, color 120ms ease, background-color 120ms ease;
      }

      .cangjie-candidate:hover,
      .cangjie-candidate.is-active {
        border-color: var(--line-strong);
        color: var(--text);
        background: rgba(109, 75, 62, 0.04);
      }

      .cangjie-candidate-char {
        font-size: 1rem;
        font-weight: 700;
        color: var(--text);
      }

      .cangjie-candidate-code {
        font-size: 0.74rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .cangjie-tree-svg {
        display: block;
        width: 100%;
        min-height: 720px;
        touch-action: none;
      }

      .cangjie-tree-edge {
        fill: none;
        stroke: rgba(125, 90, 55, 0.08);
        stroke-width: 1.05;
      }

      .cangjie-tree-edge.is-active {
        stroke: var(--accent);
        stroke-width: 2.3;
      }

      .cangjie-tree-visual-node {
        cursor: pointer;
        opacity: 0.16;
        transition: opacity 120ms ease;
      }

      .cangjie-tree-visual-node.is-active {
        opacity: 1;
      }

      .cangjie-tree-node-hitbox {
        fill: transparent;
      }

      .cangjie-tree-visual-node:hover {
        opacity: 0.42;
      }

      .cangjie-tree-visual-node.is-active:hover {
        opacity: 1;
      }

      .cangjie-tree-node-glyph {
        fill: var(--text);
        pointer-events: none;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .cangjie-tree-visual-node.is-active .cangjie-tree-node-glyph {
        fill: var(--accent);
        font-size: 1.08rem;
      }

      .atlas-footer {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: center;
        margin-top: 2rem;
        padding-top: 1rem;
        border-top: 1px solid var(--line);
      }

      .site-link {
        white-space: nowrap;
      }

      @media (max-width: 1080px) {
        .atlas-main-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 720px) {
        .landing-page {
          padding: 2rem 1rem 3rem;
        }

        .landing-header-row,
        .atlas-footer {
          flex-direction: column;
          align-items: flex-start;
        }

        .locale-switch {
          margin-left: 0;
        }

        .cangjie-tree-canvas {
          border-radius: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="/js/main.js"></script>
  </body>
</html>
